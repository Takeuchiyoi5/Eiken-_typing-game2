<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eiken 4th & 3rd Grade Typing Challenge</title>
    <style>
        :root {
            --bg-color: #fff0f5;       /* Milky Pink background */
            --card-bg: #ffffff;        /* White card surface */
            --text-main: #5c4d66;      /* Chocolate brown text */
            --accent: #ff7ebb;         /* Strawberry pink accent */
            --shuffle-color: #ba8fff;  /* Sweet lavender */
            --btn-inactive: #e8dff5;   /* Pastel purple buttons */
            --success-color: #6ee7b7;  /* Mint green */
            --typed-color: #10b981;    /* Correctly typed letter color */
            --untyped-color: #4da6ff;  /* Remaining letter color (Soda blue) */
            --error-color: #ff5252;    /* Wrong key flash color */
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            background: var(--card-bg);
            padding: 2.5rem 1.5rem;
            border-radius: 2rem; 
            box-shadow: 0 15px 30px rgba(255, 182, 193, 0.4); 
            width: 100%;
            max-width: 480px;
            border: 3px solid #ffe3ec; 
        }
        .category-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .nav-btn {
            background-color: var(--btn-inactive);
            color: #7d6b8d;
            border: none;
            padding: 0.6rem 0.4rem;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 0.75rem; 
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .nav-btn.active {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 126, 187, 0.3);
        }
        .shuffle-panel {
            margin-bottom: 1rem;
        }
        .shuffle-btn {
            background-color: var(--btn-inactive);
            color: #7d6b8d;
            border: none;
            width: 100%;
            padding: 0.6rem;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 0.75rem;
            cursor: pointer;
        }
        .shuffle-btn.active {
            background-color: var(--shuffle-color);
            color: white;
            box-shadow: 0 4px 10px rgba(186, 143, 255, 0.3);
        }
        #word-display {
            font-size: 2.4rem;
            font-weight: 800;
            min-height: 5.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.2rem;
            line-height: 1.2;
            letter-spacing: 2px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .char-correct {
            color: var(--typed-color);
            text-shadow: 0 0 5px rgba(16, 185, 129, 0.3);
        }
        .char-current {
            color: var(--untyped-color);
            border-bottom: 3px solid var(--accent); 
            animation: pulse 1s infinite alternate;
        }
        .char-error {
            color: var(--error-color);
            border-bottom: 3px solid var(--error-color);
            text-shadow: 0 0 5px rgba(255, 82, 82, 0.5);
        }
        .char-remaining {
            color: #cbd5e1; 
        }
        #meaning-display {
            font-size: 1.3rem;
            color: #8c7b99;
            min-height: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }
        .main-action {
            background-color: var(--accent); 
            color: white;
            border: none;
            padding: 1.1rem 3rem;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 9999px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 15px rgba(255, 126, 187, 0.4);
            letter-spacing: 2px;
        }
        .main-action.playing {
            background-color: #ff5252 !important; 
            box-shadow: 0 6px 15px rgba(255, 82, 82, 0.4) !important;
        }
        .score-banner {
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: #6b5b95;
            display: flex;
            justify-content: space-around;
        }
        .mastery-panel {
            margin-top: 1rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 0.5rem;
        }
        .mastery-btn {
            background-color: #f0ebf4;
            color: #7d6b8d;
            border: none;
            padding: 0.6rem;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 0.75rem;
            cursor: pointer;
        }
        .custom-entry-box {
            margin-top: 1.8rem;
            padding-top: 1.5rem;
            border-top: 2px dashed #ffe3ec; 
            text-align: left;
        }
        .custom-entry-box h3 {
            font-size: 1rem;
            color: var(--accent);
            margin: 0 0 0.75rem 0;
        }
        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .input-group input {
            background: #fffcfd;
            border: 2px solid #ffe3ec;
            color: var(--text-main);
            padding: 0.6rem;
            border-radius: 0.6rem;
            font-size: 0.85rem;
            flex: 1;
        }
        .add-word-btn {
            background-color: var(--shuffle-color);
            color: white;
            border: none;
            width: 100%;
            padding: 0.6rem;
            font-weight: bold;
            border-radius: 0.6rem;
            cursor: pointer;
        }
        .controls {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #b3a1bf;
            font-weight: bold;
        }
        input[type="range"] {
            accent-color: var(--accent);
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="category-menu">
        <button class="nav-btn active" onclick="switchCategory('all', this)">全て (All)</button>
        <button class="nav-btn" onclick="switchCategory('how', this)">疑問詞・熟語</button>
        <button class="nav-btn" onclick="switchCategory('verbs', this)">動詞（変化形）</button>
        <button class="nav-btn" onclick="switchCategory('adj', this)">形容詞・副詞</button>
        <button class="nav-btn" onclick="switchCategory('noun', this)">名詞コーナー</button>
        <button class="nav-btn" onclick="switchCategory('prep', this)">前置詞・その他</button>
        <button class="nav-btn" style="grid-column: span 2;" onclick="switchCategory('custom', this)">📥 自作カスタム単語</button>
    </div>

    <div class="shuffle-panel">
        <button id="shuffle-btn" class="shuffle-btn" onclick="toggleShuffle()">🔀 シャッフル：OFF</button>
    </div>

    <div id="word-display">Ready?</div>
    <div id="meaning-display">Press Start</div>
    
    <button id="action-btn" class="main-action" onclick="toggleApp()">START GAME</button>
    
    <div class="score-banner">
        <div>⭐ Score: <span id="score-val">0</span></div>
        <div>🎯 Combo: <span id="combo-val">0</span></div>
    </div>

    <div class="mastery-panel">
        <button class="mastery-btn" style="background-color: var(--success-color); color: #155e75;" onclick="markAsMastered()">💖 覚えた！隠す</button>
        <button class="mastery-btn" style="background-color: #fee2e2; color: #991b1b; font-size:0.75rem;" onclick="resetLocalStorage()">🔄 全初期化</button>
    </div>

    <div class="custom-entry-box">
        <h3>✨ 自分でオリジナル単語を追加</h3>
        <div class="input-group">
            <input type="text" id="custom-word" placeholder="例: play -> plays">
            <input type="text" id="custom-meaning" placeholder="例: 遊ぶ -> 遊んだ">
        </div>
        <button class="add-word-btn" onclick="addCustomWord()">単語を追加保存する</button>
    </div>

    <div class="controls">
        BGM Volume: <input type="range" id="volume" min="0" max="0.5" step="0.05" value="0.2">
    </div>
</div>

<audio id="bg-beat" loop src="Pop_swing.mp3" style="display:none;"></audio>

    function initAudioContext() {
        if (!audioCtx) {

    function playKeySuccessSound() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "sine";
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playWordCompleteSound() {
        if (!audioCtx) return;
        let now = audioCtx.currentTime;
        const tones = [523.25, 659.25, 783.99, 1046.50]; 
        tones.forEach((freq, idx) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = "triangle";
            osc.frequency.setValueAtTime(freq, now + (idx * 0.06));
            gain.gain.setValueAtTime(0.15, now + (idx * 0.06));
            gain.gain.exponentialRampToValueAtTime(0.01, now + (idx * 0.06) + 0.2);
            osc.start(now + (idx * 0.06));
            osc.stop(now + (idx * 0.06) + 0.25);
        });
    }

    function loadSavedData() {
        const savedMastered = localStorage.getItem('eiken4_masteredIds');
        masteredIds = savedMastered ? JSON.parse(savedMastered) : [];
        const savedCustomWords = localStorage.getItem('eiken4_customWords');
        const customWords = savedCustomWords ? JSON.parse(savedCustomWords) : [];
        masterVocabDb = [...baseVocabDb, ...customWords];
    }

    function saveProgress() {
        localStorage.setItem('eiken4_masteredIds', JSON.stringify(masteredIds));
    }

    function resetLocalStorage() {
        if(confirm("【警告】保存されたすべての進捗をリセットしますか？")) {
            localStorage.removeItem('eiken4_masteredIds');
            localStorage.removeItem('eiken4_customWords');
            location.reload();
        }
    }

    loadSavedData();
    applyFilterAndShuffle();

    function applyFilterAndShuffle() {
        let baseList = masterVocabDb.filter(item => !masteredIds.includes(item.id));
        if (activeCategory !== 'all') {
            baseList = baseList.filter(item => item.tag === activeCategory);
        }
        currentPlaylist = [...baseList];

        if (isShuffleOn) {
            for (let i = currentPlaylist.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentPlaylist[i], currentPlaylist[j]] = [currentPlaylist[j], currentPlaylist[i]];
            }
        }
    }

    function switchCategory(categoryTag, element) {
        const wasPlaying = isPlaying; 
        if (isPlaying) stopGame();
        
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        activeCategory = categoryTag;
        applyFilterAndShuffle();
        
        wordIndex = 0;

        if (wasPlaying && currentPlaylist.length > 0) {
            startGame(); 
        } else {
            wordDisplay.innerHTML = "Ready?";
            meaningDisplay.innerText = `Loaded ${currentPlaylist.length} items`;
        }
    }

    function toggleShuffle() {
        isShuffleOn = !isShuffleOn;
        shuffleBtn.innerText = isShuffleOn ? "🔀 シャッフル：ON" : "🔀 シャッフル：OFF";
        shuffleBtn.classList.toggle('active', isShuffleOn);
        const currentlyPlaying = isPlaying;
        if (currentlyPlaying) stopGame();
        applyFilterAndShuffle();
        wordIndex = 0;
        if (currentlyPlaying) startGame();
    }

    function markAsMastered() {
        if (currentPlaylist.length === 0) return;
        const currentItem = currentPlaylist[wordIndex];
        masteredIds.push(currentItem.id); 
        saveProgress(); 
        alert(`「${currentItem.word}」を覚えたリストに登録しました！`);
        const currentlyPlaying = isPlaying;
        if (currentlyPlaying) stopGame();
        applyFilterAndShuffle();
        wordIndex = 0;
        wordDisplay.innerHTML = "Saved!";
        if (currentlyPlaying && currentPlaylist.length > 0) startGame();
    }

    function addCustomWord() {
        const wordInput = document.getElementById('custom-word');
        const meaningInput = document.getElementById('custom-meaning');
        if (!wordInput.value.trim() || !meaningInput.value.trim()) return;

        const newEntry = {
            id: Date.now(), 
            word: wordInput.value.trim(), 
            meaning: meaningInput.value.trim(),
            tag: "custom"
        };

        const savedCustomWords = localStorage.getItem('eiken4_customWords');
        const customList = savedCustomWords ? JSON.parse(savedCustomWords) : [];
        customList.push(newEntry);
        localStorage.setItem('eiken4_customWords', JSON.stringify(customList));
        
        wordInput.value = '';
        meaningInput.value = '';
        loadSavedData(); 
        if (activeCategory === 'custom' || activeCategory === 'all') applyFilterAndShuffle();
    }

    function toggleApp() {
        if (isPlaying) { stopGame(); } else { startGame(); }
    }

    function startGame() {
        if (currentPlaylist.length === 0) return;
        initAudioContext(); 
        isPlaying = true;
        actionBtn.innerText = "STOP GAME";
        actionBtn.classList.add('playing');
        
        bgBeat.currentTime = 0;
        bgBeat.play().catch(e => { console.log("Audio play deferred"); });
        
        wordIndex = 0;
        gameScore = 0;
        gameCombo = 0;
        scoreVal.innerText = gameScore;
        comboVal.innerText = gameCombo;
        
        window.addEventListener('keydown', handleTypingInput);
        nextQuestion();
    }

    function stopGame() {
        isPlaying = false;
        actionBtn.innerText = "START GAME";
        actionBtn.classList.remove('playing');
        bgBeat.pause();
        bgBeat.currentTime = 0;
        window.removeEventListener('keydown', handleTypingInput);
        window.speechSynthesis.cancel(); 
        wordDisplay.innerHTML = "Ready?";
        meaningDisplay.innerText = "Press Start";
    }

    function renderTypingWord() {
        let htmlStr = "";
        for (let i = 0; i < targetString.length; i++) {
            if (i < typedIndex) {
                htmlStr += `<span class="char-correct">${targetString[i]}</span>`;
            } else if (i === typedIndex) {
                let cls = hasError ? "char-error" : "char-current";
                if (targetString[i] === ' ' || targetString[i] === '-' || targetString[i] === '>') {
                    htmlStr += `<span class="${cls}" style="display: inline-block; min-width: 14px; border-bottom: 3px solid currentColor;">${targetString[i]}</span>`;
                } else {
                    htmlStr += `<span class="${cls}">${targetString[i]}</span>`;
                }
            } else {
                htmlStr += `<span class="char-remaining">${targetString[i]}</span>`;
            }
        }
        wordDisplay.innerHTML = htmlStr;
    }

    function checkAndSkipNonAlpha() {
        let skippable = ['.', '?', ' '];
        if (targetString[typedIndex] === '-' || targetString[typedIndex] === '>') {
            skippable.push('-', '>');
        }

        if (typedIndex < targetString.length && skippable.includes(targetString[typedIndex])) {
            typedIndex++;
            checkAndSkipNonAlpha(); 
        }
    }

    function nextQuestion() {
        if (!isPlaying) return;
        if (currentPlaylist.length === 0) { stopGame(); return; }
        
        if (wordIndex >= currentPlaylist.length) {
            wordIndex = 0; 
        }
        
        const currentVocab = currentPlaylist[wordIndex];
        
        isWaitingForNext = false;
        hasError = false;
        typedIndex = 0;
        targetString = currentVocab.word;
        
        meaningDisplay.innerText = "タイピングしてください...";
        renderTypingWord();
        
        speak(cleanTextForTTS(targetString), 'en-US');
    }

    function handleWordCleared(currentVocab) {
        isWaitingForNext = true;
        playWordCompleteSound();
        
        meaningDisplay.innerText = currentVocab.meaning;
        speak(currentVocab.meaning, 'ja-JP');

        gameCombo++;
        gameScore += 10 + (gameCombo * 2);
        scoreVal.innerText = gameScore;
        comboVal.innerText = gameCombo;

        setTimeout(() => {
            if (!isPlaying) return;
            wordIndex++;
            nextQuestion();
        }, 1200);
    }

    function handleTypingInput(e) {
        if (e.key === ' ') e.preventDefault();
        if (targetString === "" || isWaitingForNext) return; 
        
        let key = e.key;
        checkAndSkipNonAlpha();
        
        if (typedIndex < targetString.length) {
            if (key.toLowerCase() === targetString[typedIndex].toLowerCase()) {
                typedIndex++;
                hasError = false; 
                checkAndSkipNonAlpha(); 
                renderTypingWord();

                if (typedIndex >= targetString.length) {
                    handleWordCleared(currentPlaylist[wordIndex]);
                } else {
                    playKeySuccessSound();   
                }
            } 
            else if (key !== "Shift" && key !== "CapsLock" && key !== "Control" && key !== "Alt") {
                hasError = true; 
                gameCombo = 0; 
                comboVal.innerText = gameCombo;
                renderTypingWord(); 
            }
        }
    }

    function cleanTextForTTS(rawText) {
        return rawText.replace('->', ' to ').replace('...', '');
    }

    function speak(text, lang) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        utterance.rate = 1.0; 
        window.speechSynthesis.speak(utterance);
    }
</script>
